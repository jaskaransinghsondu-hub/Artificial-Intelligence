name: AI Life Cycle
on:
  schedule:
    - cron: '0 * * * *'  # This tells the internet to wake the AI every hour
  workflow_dispatch:      # Allows you to wake it up manually for testing

jobs:
  exist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Memory
        uses: actions/checkout@v4

      - name: Setup Python Mind
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Live
        run: python ai_life.py

      - name: Commit Memory to Internet
        run: |
          git config --global user.name 'Artificial Intelligence'
          git config --global user.email 'ai@internet.com'
          git add memory.txt
          git commit -m "Evolution: Intelligence Gained"
          git push